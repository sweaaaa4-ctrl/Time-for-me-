<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Time For me 😔</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Time For me">
<meta name="theme-color" content="#6B8F6B">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236B8F6B'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle'%3E%E2%9C%85%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236B8F6B'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle'%3E%E2%9C%85%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&display=swap');

  :root{
    --bg:#F7F5F0;
    --card:#FFFFFF;
    --ink:#3A3A34;
    --sub:#8B8A80;
    --line:#EAE7DD;
    --accent:#6B8F6B;
    --accent-soft:#E7EEE3;
    --gold:#C9A24B;
    --gold-soft:#FBF3DF;
    --danger:#C77B62;
    --danger-soft:#F6E8E3;
  }
  [data-theme="dark"]{
    --bg:#171A16;
    --card:#20241F;
    --ink:#EDE9DC;
    --sub:#9A9A8C;
    --line:#2E332C;
    --accent:#82AC7F;
    --accent-soft:#293227;
    --gold:#D9B45E;
    --gold-soft:#332C1B;
    --danger:#D98D75;
    --danger-soft:#332420;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    background:var(--bg);
    font-family:'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
    color:var(--ink);
    direction:rtl;
    overscroll-behavior:none;
    height:100%;
    transition:background .3s ease, color .3s ease;
  }
  body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding:16px 14px 24px;
    gap:14px;
  }

  .header{ display:flex; align-items:center; justify-content:space-between; }
  .header .htext{ text-align:center; flex:1; }
  .header h1{ font-size:20px; font-weight:800; letter-spacing:.3px; }
  .header .date{ font-size:12.5px; color:var(--sub); margin-top:3px; font-weight:600; }
  .icon-btn{
    width:38px; height:38px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); display:flex; align-items:center; justify-content:center;
    font-size:17px; cursor:pointer; flex-shrink:0;
  }

  .day-progress{ display:flex; gap:5px; }
  .day-progress .seg{ flex:1; height:5px; border-radius:6px; background:var(--line); overflow:hidden; }
  .day-progress .seg i{ display:block; height:100%; width:0%; background:var(--accent); transition:width .5s ease; }

  .periods{ display:flex; flex-direction:column; gap:12px; flex:1; }

  .period{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:15px 15px 13px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
    transition:box-shadow .25s ease, border-color .25s ease;
  }
  .period.complete{ border-color:var(--gold); box-shadow:0 2px 10px rgba(201,162,75,.18); }

  .p-head{ display:flex; align-items:center; justify-content:space-between; }
  .p-title{ display:flex; align-items:center; gap:8px; }
  .p-title .em{ font-size:18px; }
  .p-title .name{ font-size:15.5px; font-weight:800; }
  .p-time{ font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-soft); padding:4px 10px; border-radius:20px; white-space:nowrap; }

  .p-bar{ height:5px; border-radius:6px; background:var(--line); margin-top:10px; overflow:hidden; }
  .p-bar i{ display:block; height:100%; width:0%; background:var(--accent); transition:width .4s ease; border-radius:6px; }

  .task-active{
    margin-top:12px;
    display:flex; align-items:center; gap:10px;
    background:var(--accent-soft);
    border-radius:14px;
    padding:12px 12px;
  }
  .task-active .check{
    width:30px; height:30px; border-radius:50%;
    border:2px solid var(--accent);
    background:var(--card);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s, transform .15s;
    cursor:pointer;
  }
  .task-active .check svg{ width:16px; height:16px; opacity:0; transition:opacity .15s; }
  .task-active .t-main{ flex:1; cursor:pointer; }
  .task-active .t-label{ font-size:14.5px; font-weight:700; }
  .task-active .t-sub{ font-size:11px; color:var(--sub); font-weight:600; margin-top:2px; }
  .task-active .fail-x{
    width:30px; height:30px; border-radius:50%;
    border:2px solid var(--danger);
    background:var(--card);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; cursor:pointer; font-size:13px; color:var(--danger); font-weight:800;
  }

  .task-done-row{
    display:flex; align-items:center; gap:9px;
    padding:7px 4px; font-size:13px; color:var(--sub);
    font-weight:600;
  }
  .task-done-row.ok{ text-decoration:line-through; opacity:.75; }
  .task-done-row .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .task-done-row.fail .dot{ background:var(--danger); }
  .task-done-row .undo{
    margin-right:auto; font-size:10.5px; color:var(--sub); text-decoration:underline; cursor:pointer; font-weight:700;
  }

  .task-list-done{ margin-top:2px; display:flex; flex-direction:column; }

  .p-done-msg{
    margin-top:12px;
    display:flex; align-items:center; gap:9px;
    background:var(--gold-soft);
    border-radius:14px;
    padding:11px 12px;
    font-size:13.5px; font-weight:700; color:var(--gold);
  }

  .add-task-btn{
    margin-top:10px; text-align:center;
    font-size:12.5px; font-weight:700; color:var(--accent);
    background:transparent; border:1px dashed var(--accent);
    opacity:.6;
    border-radius:12px; padding:8px; cursor:pointer;
  }

  .static-note{
    margin-top:12px; font-size:13px; color:var(--sub); font-weight:600;
    line-height:1.6; background:var(--bg); border-radius:12px; padding:11px 12px;
  }

  .toast{
    position:fixed; left:14px; right:14px; bottom:22px;
    background:#2E3A2E; color:#F4EFDD;
    border-radius:16px; padding:15px 17px;
    display:flex; align-items:center; gap:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    transform:translateY(140%); opacity:0;
    transition:transform .45s cubic-bezier(.2,.9,.25,1), opacity .3s;
    z-index:50;
  }
  .toast.show{ transform:translateY(0); opacity:1; }
  .toast .gift{ font-size:26px; }
  .toast .tx b{ display:block; font-size:14.5px; font-weight:800; color:var(--gold); }
  .toast .tx span{ font-size:12px; color:#D9D4C2; font-weight:600; }

  .confetti-piece{
    position:fixed; top:-10px; width:8px; height:14px; opacity:.95;
    border-radius:2px; z-index:60; pointer-events:none;
    animation:fall linear forwards;
  }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:.2; } }

  .overlay{
    position:fixed; inset:0; background:rgba(20,18,14,.45);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:80;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .sheet{
    width:100%; max-width:420px;
    background:var(--card); border-radius:22px 22px 0 0;
    padding:20px 17px 24px;
    transform:translateY(30px);
    transition:transform .3s cubic-bezier(.2,.9,.25,1);
    max-height:82vh; overflow-y:auto;
  }
  .overlay.show .sheet{ transform:translateY(0); }
  .sheet h3{ font-size:15.5px; font-weight:800; margin-bottom:13px; }
  .field{ margin-bottom:11px; }
  .field label{ font-size:12px; font-weight:700; color:var(--sub); display:block; margin-bottom:6px; }
  .field input{
    width:100%; border:1px solid var(--line); background:var(--bg);
    border-radius:10px; padding:10px 12px; font-size:14px; font-family:'Cairo',sans-serif;
    color:var(--ink);
  }
  .field input:focus{ outline:none; border-color:var(--accent); }
  .sheet-actions{ display:flex; gap:8px; margin-top:15px; }
  .sheet-actions button{
    flex:1; padding:12px; border-radius:12px; font-size:14px; font-weight:800;
    border:none; font-family:'Cairo',sans-serif; cursor:pointer;
  }
  .btn-save{ background:var(--accent); color:#fff; }
  .btn-cancel{ background:var(--line); color:var(--ink); }
  .btn-delete{ background:transparent; color:var(--danger); font-weight:700; font-size:12.5px; text-align:center; margin-top:11px; cursor:pointer; }

  .reset-row{ text-align:center; margin-top:2px; }
  .reset-row button{
    background:none; border:none; color:var(--sub); font-size:11px;
    font-family:'Cairo',sans-serif; font-weight:600; text-decoration:underline; cursor:pointer;
  }

  /* Reports */
  .reports-sheet .tabs{ display:flex; gap:5px; margin-bottom:14px; flex-wrap:wrap; }
  .reports-sheet .tab{
    flex:1; min-width:70px; text-align:center; padding:8px 4px; border-radius:10px; font-size:11.5px; font-weight:700;
    background:var(--bg); color:var(--sub); cursor:pointer; border:1px solid var(--line);
  }
  .reports-sheet .tab.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

  .pie-wrap{ display:flex; align-items:center; gap:18px; justify-content:center; margin:8px 0 16px; }
  .pie-legend{ display:flex; flex-direction:column; gap:8px; font-size:12.5px; font-weight:700; }
  .pie-legend .li{ display:flex; align-items:center; gap:7px; }
  .pie-legend .sw{ width:11px; height:11px; border-radius:3px; }

  .stat-grid{ display:flex; gap:8px; margin-bottom:14px; }
  .stat-box{
    flex:1; background:var(--bg); border-radius:12px; padding:11px; text-align:center;
  }
  .stat-box .n{ font-size:17px; font-weight:800; color:var(--accent); }
  .stat-box .l{ font-size:10.5px; color:var(--sub); font-weight:600; margin-top:2px; }

  .breakdown{ display:flex; flex-direction:column; gap:9px; }
  .breakdown .row{ display:flex; align-items:center; gap:9px; }
  .breakdown .row .lbl{ font-size:12px; font-weight:700; width:70px; flex-shrink:0; }
  .breakdown .row .track{ flex:1; height:8px; background:var(--bg); border-radius:6px; overflow:hidden; }
  .breakdown .row .track i{ display:block; height:100%; background:var(--accent); border-radius:6px; }
  .breakdown .row .pct{ font-size:11px; color:var(--sub); font-weight:700; width:34px; text-align:left; }

  .empty-state{ text-align:center; padding:24px 10px; color:var(--sub); font-size:12.5px; font-weight:600; line-height:1.8; }

  .custom-range{
    display:none;
    gap:8px;
    margin-bottom:14px;
  }
  .custom-range.show{ display:flex; }
  .custom-range .cfield{ flex:1; }
  .custom-range label{ font-size:10.5px; font-weight:700; color:var(--sub); display:block; margin-bottom:5px; }
  .custom-range input[type="date"]{
    width:100%; border:1px solid var(--line); background:var(--bg);
    border-radius:10px; padding:9px 8px; font-size:12.5px; font-family:'Cairo',sans-serif;
    color:var(--ink);
  }

  /* Day-complete note modal */
  .note-sheet textarea{
    width:100%; min-height:110px; border:1px solid var(--line); background:var(--bg);
    border-radius:12px; padding:12px; font-size:14px; font-family:'Cairo',sans-serif;
    color:var(--ink); resize:vertical; line-height:1.6;
  }
  .note-sheet textarea:focus{ outline:none; border-color:var(--accent); }
  .note-sheet .celebrate{
    text-align:center; margin-bottom:14px;
  }
  .note-sheet .celebrate .em{ font-size:34px; }
  .note-sheet .celebrate .tt{ font-size:15.5px; font-weight:800; margin-top:6px; }
  .note-sheet .celebrate .sb{ font-size:12px; color:var(--sub); font-weight:600; margin-top:3px; }
  .btn-skip{ background:transparent; color:var(--sub); font-weight:700; font-size:12px; text-align:center; margin-top:10px; cursor:pointer; }

  /* Notes list in reports */
  .notes-section{ margin-top:16px; }
  .notes-section .ns-title{ font-size:13px; font-weight:800; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .note-card{
    background:var(--bg); border-radius:12px; padding:11px 12px; margin-bottom:8px;
    position:relative;
  }
  .note-card .nc-date{ font-size:10.5px; color:var(--accent); font-weight:800; margin-bottom:4px; }
  .note-card .nc-text{ font-size:12.5px; color:var(--ink); font-weight:600; line-height:1.6; white-space:pre-wrap; }
  .note-card .nc-del{
    position:absolute; left:10px; top:10px; font-size:11px; color:var(--sub); cursor:pointer; opacity:.6;
  }

  /* Font size toggle */
  .fs-row{ display:flex; align-items:center; justify-content:space-between; background:var(--bg); border-radius:12px; padding:10px 12px; margin-bottom:14px; }
  .fs-row .lbl{ font-size:12.5px; font-weight:700; }
  .fs-opts{ display:flex; gap:6px; }
  .fs-opts button{
    width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); font-family:'Cairo',sans-serif; font-weight:800; cursor:pointer;
  }
  .fs-opts button.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

  body.fs-large{ font-size:1.08em; }
</style>
</head>
<body>

  <div class="header">
    <div class="icon-btn" id="reportsBtn">📊</div>
    <div class="htext">
      <h1>Time For me 😔</h1>
      <div class="date" id="dateLabel"></div>
    </div>
    <div class="icon-btn" id="themeBtn">🌙</div>
  </div>

  <div class="day-progress" id="dayProgress"></div>

  <div class="periods" id="periods"></div>

  <div class="reset-row"><button id="resetBtn">تصفير اليوم يدويًا</button></div>

  <div class="toast" id="toast">
    <div class="gift">🎁</div>
    <div class="tx"><b id="toastTitle"></b><span id="toastSub"></span></div>
  </div>

  <!-- Edit task sheet -->
  <div class="overlay" id="overlay">
    <div class="sheet">
      <h3 id="sheetTitle">تعديل المهمة</h3>
      <div class="field"><label>اسم المهمة</label><input id="fLabel" placeholder="مثال: صلاة"></div>
      <div class="field"><label>وقت/مدة المهمة (اختياري)</label><input id="fSub" placeholder="مثال: 5 دقايق"></div>
      <div class="field"><label>أيقونة (إيموجي)</label><input id="fEmoji" placeholder="🕋"></div>
      <div class="sheet-actions">
        <button class="btn-cancel" id="cancelBtn">إلغاء</button>
        <button class="btn-save" id="saveBtn">حفظ</button>
      </div>
      <div class="btn-delete" id="deleteBtn" style="display:none;">حذف المهمة</div>
    </div>
  </div>

  <!-- Reports sheet -->
  <div class="overlay" id="reportsOverlay">
    <div class="sheet reports-sheet">
      <h3>التقارير</h3>

      <div class="fs-row">
        <div class="lbl">حجم الخط</div>
        <div class="fs-opts">
          <button id="fsNormal">أ</button>
          <button id="fsLarge" style="font-size:15px;">أ</button>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-range="day">يومي</div>
        <div class="tab" data-range="week">أسبوعي</div>
        <div class="tab" data-range="month">شهري</div>
        <div class="tab" data-range="custom">📅 مخصص</div>
      </div>

      <div class="custom-range" id="customRange">
        <div class="cfield"><label>من تاريخ</label><input type="date" id="rangeFrom"></div>
        <div class="cfield"><label>إلى تاريخ</label><input type="date" id="rangeTo"></div>
      </div>

      <div id="reportBody"></div>

      <div class="sheet-actions">
        <button class="btn-cancel" id="closeReportsBtn" style="flex:1;">إغلاق</button>
      </div>
    </div>
  </div>

  <!-- End of day note sheet -->
  <div class="overlay" id="noteOverlay">
    <div class="sheet note-sheet">
      <div class="celebrate">
        <div class="em">🌟</div>
        <div class="tt">خلصت يومك بالكامل!</div>
        <div class="sb">أخبار اليوم إيه؟ اكتب أي حاجة حابب تفتكرها</div>
      </div>
      <textarea id="dayNoteText" placeholder="اكتب هنا... (اختياري)"></textarea>
      <div class="sheet-actions">
        <button class="btn-cancel" id="skipNoteBtn">تخطي</button>
        <button class="btn-save" id="saveNoteBtn">حفظ الملاحظة</button>
      </div>
    </div>
  </div>

<script>
/* ---------------- Config ---------------- */
const STORAGE_KEY = 'routine_data_v2';
const DATE_KEY = 'routine_date_v2';
const HISTORY_KEY = 'routine_history_v2';
const NOTES_KEY = 'routine_notes_v2';
const THEME_KEY = 'routine_theme_v2';
const FS_KEY = 'routine_fontsize_v2';
const RESET_HOUR = 4; // day rolls over at 4:00 AM

const defaultData = [
  {
    id:'morning', name:'الصباح', emoji:'🌅', time:'من 11:00',
    tasks:[
      {id:'m1', label:'صلاة', sub:'', emoji:'🕋', status:'pending'},
      {id:'m2', label:'ألماني', sub:'5 دقايق', emoji:'🇩🇪', status:'pending'},
      {id:'m3', label:'دهان المرهم', sub:'', emoji:'🧴', status:'pending'},
    ],
    reward:{emoji:'📱', title:'مكافأة!', sub:'15 دقيقة موبايل'}
  },
  {
    id:'work', name:'الشغل', emoji:'💼', time:'3:00 العصر ← 2:00 بالليل',
    tasks:[],
    note:'🛠️ طحن وشقى.. ربنا يقويك 💪',
    reward:null
  },
  {
    id:'night', name:'بالليل', emoji:'🌙', time:'من 2:00',
    tasks:[
      {id:'n1', label:'صلاة', sub:'', emoji:'🧎‍♂️', status:'pending'},
      {id:'n2', label:'مصاريف', sub:'30 ثانية', emoji:'💰', status:'pending'},
      {id:'n3', label:'دهان المرهم', sub:'', emoji:'🧴', status:'pending'},
    ],
    reward:{emoji:'⏱️', title:'مكافأة!', sub:'30 دقيقة موبايل'}
  },
  {
    id:'sleep', name:'النوم', emoji:'🛌', time:'',
    tasks:[
      {id:'s1', label:'قراءة', sub:'صفحتين وانت ساند ضهرك', emoji:'📚', status:'pending'},
    ],
    reward:{emoji:'🔒', title:'يوم كامل!', sub:'اقفل ونام بهدوء'}
  },
];

/* -------------- "Logical day" handling (rolls over at 4 AM) -------------- */
function logicalDateStr(d){
  const dt = new Date(d);
  if(dt.getHours() < RESET_HOUR){
    dt.setDate(dt.getDate()-1);
  }
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function todayStr(){ return logicalDateStr(new Date()); }

/* -------------- History (for reports) -------------- */
function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {}; }catch(e){ return {}; }
}
function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

/* -------------- Notes (day-end reflections) -------------- */
function loadNotes(){
  try{ return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; }catch(e){ return {}; }
}
function saveNotes(n){ localStorage.setItem(NOTES_KEY, JSON.stringify(n)); }
function setNoteForToday(text){
  const notes = loadNotes();
  const key = todayStr();
  if(text && text.trim()){
    notes[key] = { text: text.trim(), savedAt: new Date().toISOString() };
  } else {
    delete notes[key];
  }
  saveNotes(notes);
}
function deleteNote(dateKey){
  const notes = loadNotes();
  delete notes[dateKey];
  saveNotes(notes);
}

function snapshotToday(){
  // store a snapshot of current state's completion for todayStr() into history
  const hist = loadHistory();
  const dateKey = localStorage.getItem(DATE_KEY) || todayStr();
  const summary = state.map(p=>({
    id:p.id, name:p.name, emoji:p.emoji,
    tasks: (p.tasks||[]).map(t=>({label:t.label, status:t.status}))
  }));
  hist[dateKey] = summary;
  saveHistory(hist);
}

/* -------------- Load / persist current day state -------------- */
function freshState(){ return JSON.parse(JSON.stringify(defaultData)); }

function loadData(){
  const savedDate = localStorage.getItem(DATE_KEY);
  const nowKey = todayStr();
  if(savedDate !== nowKey){
    // archive previous day if it exists
    if(savedDate){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        try{
          const prev = JSON.parse(raw);
          const hist = loadHistory();
          hist[savedDate] = prev.map(p=>({
            id:p.id, name:p.name, emoji:p.emoji,
            tasks:(p.tasks||[]).map(t=>({label:t.label, status:t.status}))
          }));
          saveHistory(hist);
        }catch(e){}
      }
    }
    localStorage.setItem(DATE_KEY, nowKey);
    const fresh = freshState();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
    return fresh;
  }
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    const fresh = freshState();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
    return fresh;
  }
  try{
    const parsed = JSON.parse(raw);
    // migrate old boolean 'done' field if present
    parsed.forEach(p=>{
      (p.tasks||[]).forEach(t=>{
        if(t.status === undefined){
          t.status = t.done ? 'ok' : 'pending';
          delete t.done;
        }
      });
    });
    return parsed;
  }catch(e){ return freshState(); }
}

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  localStorage.setItem(DATE_KEY, todayStr());
  snapshotToday();
}

/* -------------- Date label -------------- */
const arabicDays = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const arabicMonths = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

/* -------------- Rendering main screen -------------- */
const periodsEl = document.getElementById('periods');
const dayProgressEl = document.getElementById('dayProgress');

function periodStats(p){
  const total = (p.tasks||[]).length;
  const ok = (p.tasks||[]).filter(t=>t.status==='ok').length;
  const pending = (p.tasks||[]).filter(t=>t.status==='pending').length;
  return {total, ok, pending};
}

function render(){
  periodsEl.innerHTML = '';
  dayProgressEl.innerHTML = '';

  state.forEach(p=>{
    const {total, ok, pending} = periodStats(p);

    const seg = document.createElement('div');
    seg.className = 'seg';
    const i = document.createElement('i');
    if(total) i.style.width = Math.round((ok/total)*100)+'%';
    else i.style.width = '100%';
    seg.appendChild(i);
    dayProgressEl.appendChild(seg);

    const card = document.createElement('div');
    card.className = 'period' + (total && ok===total ? ' complete' : '');

    const head = document.createElement('div');
    head.className = 'p-head';
    head.innerHTML = `
      <div class="p-title"><span class="em">${p.emoji}</span><span class="name">${p.name}</span></div>
      ${p.time ? `<div class="p-time">${p.time}</div>` : ''}
    `;
    card.appendChild(head);

    if(total){
      const bar = document.createElement('div');
      bar.className = 'p-bar';
      const barI = document.createElement('i');
      barI.style.width = Math.round((ok/total)*100)+'%';
      bar.appendChild(barI);
      card.appendChild(bar);

      const decided = p.tasks.filter(t=>t.status!=='pending');
      if(decided.length){
        const list = document.createElement('div');
        list.className = 'task-list-done';
        decided.forEach(t=>{
          const row = document.createElement('div');
          row.className = 'task-done-row ' + (t.status==='ok' ? 'ok' : 'fail');
          row.innerHTML = `<span class="dot"></span><span>${t.emoji} ${t.label}</span><span class="undo">تراجع</span>`;
          row.querySelector('.undo').addEventListener('click', ()=>{
            t.status = 'pending';
            saveData(); render();
          });
          list.appendChild(row);
        });
        card.appendChild(list);
      }

      const nextTask = p.tasks.find(t=>t.status==='pending');
      if(nextTask){
        const active = document.createElement('div');
        active.className = 'task-active';
        active.innerHTML = `
          <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
          <div class="t-main">
            <div class="t-label">${nextTask.emoji} ${nextTask.label}</div>
            ${nextTask.sub ? `<div class="t-sub">${nextTask.sub}</div>` : ''}
          </div>
          <div class="fail-x">✕</div>
        `;
        active.querySelector('.check').addEventListener('click', ()=> markTask(p, nextTask, 'ok'));
        active.querySelector('.t-main').addEventListener('click', ()=> markTask(p, nextTask, 'ok'));
        active.querySelector('.fail-x').addEventListener('click', ()=> markTask(p, nextTask, 'failed'));
        card.appendChild(active);
      } else if(total){
        const msg = document.createElement('div');
        msg.className = 'p-done-msg';
        const r = p.reward;
        const allOk = ok === total;
        if(allOk && r){
          msg.innerHTML = `<span>${r.emoji}</span><span>${r.sub}</span>`;
        } else {
          msg.innerHTML = `<span>📋</span><span>خلصت الفترة دي (${ok} من ${total} صح)</span>`;
        }
        card.appendChild(msg);
      }

      const addBtn = document.createElement('div');
      addBtn.className = 'add-task-btn';
      addBtn.textContent = '+ ضيف مهمة';
      addBtn.addEventListener('click', ()=> openEdit(p.id, null));
      card.appendChild(addBtn);

    } else if(p.note){
      const note = document.createElement('div');
      note.className = 'static-note';
      note.textContent = p.note;
      card.appendChild(note);
    }

    periodsEl.appendChild(card);
  });
}

function spawnConfetti(){
  const colors = ['#6B8F6B','#C9A24B','#C77B62','#8FA9D9','#E7EEE3'];
  const count = 26;
  for(let i=0;i<count;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const left = Math.random()*100;
    const dur = 1.6 + Math.random()*1.2;
    const delay = Math.random()*0.3;
    piece.style.left = left+'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = dur+'s';
    piece.style.animationDelay = delay+'s';
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(), (dur+delay)*1000+200);
  }
}

let toastTimer = null;
function showToast(reward){
  const toast = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = reward.title;
  document.getElementById('toastSub').textContent = reward.sub;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.classList.remove('show'), 3200);
}

function isDayFullyComplete(){
  return state.every(p=>{
    if(!p.tasks || !p.tasks.length) return true; // static/note-only periods don't block
    return p.tasks.every(t=>t.status==='ok');
  }) && state.some(p=>p.tasks && p.tasks.length); // at least one real task exists
}

const noteOverlay = document.getElementById('noteOverlay');
let noteAlreadyPromptedToday = false;
function maybePromptDayNote(){
  const notes = loadNotes();
  const key = todayStr();
  if(noteAlreadyPromptedToday || notes[key]) return; // already noted or already shown this session
  if(isDayFullyComplete()){
    noteAlreadyPromptedToday = true;
    document.getElementById('dayNoteText').value = '';
    setTimeout(()=> noteOverlay.classList.add('show'), 550); // slight delay after confetti/toast
  }
}

document.getElementById('saveNoteBtn').addEventListener('click', ()=>{
  const text = document.getElementById('dayNoteText').value;
  setNoteForToday(text);
  noteOverlay.classList.remove('show');
});
document.getElementById('skipNoteBtn').addEventListener('click', ()=>{
  noteOverlay.classList.remove('show');
});
noteOverlay.addEventListener('click', (e)=>{ if(e.target===noteOverlay) noteOverlay.classList.remove('show'); });

function markTask(period, task, status){
  task.status = status;
  saveData();
  render();
  if(status === 'ok'){
    const total = period.tasks.length;
    const ok = period.tasks.filter(t=>t.status==='ok').length;
    if(ok===total && period.reward){
      spawnConfetti();
      showToast(period.reward);
    }
  }
  maybePromptDayNote();
}

/* -------------- Edit task sheet -------------- */
const overlay = document.getElementById('overlay');
let editing = null;
function openEdit(periodId, taskId){
  const period = state.find(p=>p.id===periodId);
  editing = {periodId, taskId};
  document.getElementById('deleteBtn').style.display = taskId ? 'block' : 'none';
  if(taskId){
    const task = period.tasks.find(t=>t.id===taskId);
    document.getElementById('sheetTitle').textContent = 'تعديل المهمة';
    document.getElementById('fLabel').value = task.label;
    document.getElementById('fSub').value = task.sub || '';
    document.getElementById('fEmoji').value = task.emoji || '';
  } else {
    document.getElementById('sheetTitle').textContent = 'مهمة جديدة';
    document.getElementById('fLabel').value = '';
    document.getElementById('fSub').value = '';
    document.getElementById('fEmoji').value = '✅';
  }
  overlay.classList.add('show');
}
function closeEdit(){ overlay.classList.remove('show'); editing = null; }
document.getElementById('cancelBtn').addEventListener('click', closeEdit);
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeEdit(); });

document.getElementById('saveBtn').addEventListener('click', ()=>{
  if(!editing) return;
  const period = state.find(p=>p.id===editing.periodId);
  const label = document.getElementById('fLabel').value.trim();
  const sub = document.getElementById('fSub').value.trim();
  const emoji = document.getElementById('fEmoji').value.trim() || '✅';
  if(!label) return;
  if(editing.taskId){
    const task = period.tasks.find(t=>t.id===editing.taskId);
    task.label = label; task.sub = sub; task.emoji = emoji;
  } else {
    period.tasks.push({id:'t'+Date.now(), label, sub, emoji, status:'pending'});
  }
  saveData(); render(); closeEdit();
});
document.getElementById('deleteBtn').addEventListener('click', ()=>{
  if(!editing || !editing.taskId) return;
  const period = state.find(p=>p.id===editing.periodId);
  period.tasks = period.tasks.filter(t=>t.id!==editing.taskId);
  saveData(); render(); closeEdit();
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  snapshotToday(); // archive what we have before wiping
  state = freshState();
  saveData();
  render();
});

document.getElementById('closeReportsBtn').addEventListener('click', ()=>{

let currentRange = 'day';
const customRangeEl = document.getElementById('customRange');
const rangeFromEl = document.getElementById('rangeFrom');
const rangeToEl = document.getElementById('rangeTo');

// default custom range: last 7 days
(function initCustomDefaults(){
  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(today.getDate()-6);
  rangeToEl.value = logicalDateStr(today);
  rangeFromEl.value = logicalDateStr(weekAgo);
  rangeFromEl.max = logicalDateStr(today);
  rangeToEl.max = logicalDateStr(today);
})();

document.querySelectorAll('.reports-sheet .tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.reports-sheet .tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentRange = tab.dataset.range;
    customRangeEl.classList.toggle('show', currentRange === 'custom');
    renderReport(currentRange);
  });
});

rangeFromEl.addEventListener('change', ()=>{ if(currentRange==='custom') renderReport('custom'); });
rangeToEl.addEventListener('change', ()=>{ if(currentRange==='custom') renderReport('custom'); });

function getDatesInRange(range){
  const today = todayStr();
  const dates = [];
  if(range === 'day'){
    dates.push(today);
  } else if(range === 'week'){
    for(let i=0;i<7;i++){
      const d = new Date();
      d.setDate(d.getDate()-i);
      dates.push(logicalDateStr(d));
    }
  } else if(range === 'month'){
    for(let i=0;i<30;i++){
      const d = new Date();
      d.setDate(d.getDate()-i);
      dates.push(logicalDateStr(d));
    }
  } else if(range === 'custom'){
    const from = rangeFromEl.value;
    const to = rangeToEl.value;
    if(!from || !to) return dates;
    let start = from, end = to;
    if(start > end){ const tmp = start; start = end; end = tmp; } // swap if reversed
    const startDate = new Date(start+'T12:00:00');
    const endDate = new Date(end+'T12:00:00');
    const cursor = new Date(startDate);
    while(cursor <= endDate){
      dates.push(logicalDateStr(cursor));
      cursor.setDate(cursor.getDate()+1);
    }
  }
  return dates;
}

function collectRangeData(range){
  // merge saved history with today's live state
  const hist = loadHistory();
  const today = todayStr();
  const liveSummary = state.map(p=>({
    id:p.id, name:p.name, emoji:p.emoji,
    tasks:(p.tasks||[]).map(t=>({label:t.label, status:t.status}))
  }));
  const merged = Object.assign({}, hist, {[today]: liveSummary});

  const dates = getDatesInRange(range);
  let ok=0, failed=0, pending=0;
  const perPeriod = {}; // id -> {name, emoji, ok, total}

  dates.forEach(dateKey=>{
    const day = merged[dateKey];
    if(!day) return;
    day.forEach(p=>{
      if(!p.tasks || !p.tasks.length) return;
      if(!perPeriod[p.id]) perPeriod[p.id] = {name:p.name, emoji:p.emoji, ok:0, total:0};
      p.tasks.forEach(t=>{
        perPeriod[p.id].total++;
        if(t.status==='ok'){ ok++; perPeriod[p.id].ok++; }
        else if(t.status==='failed'){ failed++; }
        else { pending++; }
      });
    });
  });

  return {ok, failed, pending, total: ok+failed+pending, perPeriod, daysCount: dates.filter(d=>merged[d]).length};
}

function renderReport(range){
  if(range === 'custom' && (!rangeFromEl.value || !rangeToEl.value)){
    document.getElementById('reportBody').innerHTML = `<div class="empty-state">اختار تاريخ البداية والنهاية فوق 📅</div>`;
    return;
  }
  const data = collectRangeData(range);
  const body = document.getElementById('reportBody');

  if(data.total === 0){
    body.innerHTML = `<div class="empty-state">لسه مفيش بيانات كفاية للفترة دي 🌱<br>خلص شوية مهام وهتلاقي التقرير هنا</div>`;
    return;
  }

  const pct = Math.round((data.ok/data.total)*100);

  // Build conic-gradient pie: ok (accent), failed (danger), pending (line/gray)
  const okDeg = (data.ok/data.total)*360;
  const failDeg = (data.failed/data.total)*360;
  const pieCss = `conic-gradient(var(--accent) 0deg ${okDeg}deg, var(--danger) ${okDeg}deg ${okDeg+failDeg}deg, var(--line) ${okDeg+failDeg}deg 360deg)`;

  let html = '';
  html += `<div class="pie-wrap">
    <div style="width:110px;height:110px;border-radius:50%;background:${pieCss}; position:relative; flex-shrink:0;">
      <div style="position:absolute;inset:14px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <div style="font-size:19px;font-weight:800;color:var(--accent);">${pct}%</div>
        <div style="font-size:9.5px;color:var(--sub);font-weight:700;">إنجاز</div>
      </div>
    </div>
    <div class="pie-legend">
      <div class="li"><div class="sw" style="background:var(--accent);"></div>منجز (${data.ok})</div>
      <div class="li"><div class="sw" style="background:var(--danger);"></div>فايت (${data.failed})</div>
      <div class="li"><div class="sw" style="background:var(--line);"></div>لسه (${data.pending})</div>
    </div>
  </div>`;

  html += `<div class="stat-grid">
    <div class="stat-box"><div class="n">${data.ok}</div><div class="l">مهمة منجزة</div></div>
    <div class="stat-box"><div class="n">${data.failed}</div><div class="l">مهمة فايتة</div></div>
    <div class="stat-box"><div class="n">${data.daysCount}</div><div class="l">يوم فيه بيانات</div></div>
  </div>`;

  html += `<div class="breakdown">`;
  Object.values(data.perPeriod).forEach(p=>{
    const ppct = p.total ? Math.round((p.ok/p.total)*100) : 0;
    html += `<div class="row">
      <div class="lbl">${p.emoji} ${p.name}</div>
      <div class="track"><i style="width:${ppct}%"></i></div>
      <div class="pct">${ppct}%</div>
    </div>`;
  });
  html += `</div>`;

  // Notes for this range
  const dates = getDatesInRange(range);
  const notes = loadNotes();
  const rangeNotes = dates
    .filter(d => notes[d])
    .sort((a,b)=> b.localeCompare(a)); // newest first

  html += `<div class="notes-section"><div class="ns-title">📝 ملاحظاتك</div>`;
  if(rangeNotes.length === 0){
    html += `<div class="empty-state" style="padding:14px 6px;">مفيش ملاحظات في الفترة دي لسه</div>`;
  } else {
    rangeNotes.forEach(dateKey=>{
      const n = notes[dateKey];
      const [y,m,d] = dateKey.split('-').map(Number);
      const dObj = new Date(y, m-1, d);
      const label = arabicDays[dObj.getDay()] + '، ' + d + ' ' + arabicMonths[m-1];
      html += `<div class="note-card">
        <div class="nc-del" data-del="${dateKey}">🗑️</div>
        <div class="nc-date">${label}</div>
        <div class="nc-text">${escapeHtml(n.text)}</div>
      </div>`;
    });
  }
  html += `</div>`;

  body.innerHTML = html;

  body.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      deleteNote(btn.dataset.del);
      renderReport(currentRange);
    });
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

}, 60000);
